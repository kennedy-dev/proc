name: gov-scout

# Gov Opportunity Scout — self-hosted stack
# Core services:  postgres + valkey + searxng + n8n
# Optional:       caddy (TLS reverse proxy, profile "proxy") · mailpit (test SMTP, profile "dev")
# Bring up core:        docker compose up -d
# With TLS proxy:       docker compose --profile proxy up -d
# With local mailbox:   docker compose --profile dev up -d

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-n8n}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-n8n}
      TZ: ${TZ:-Africa/Nairobi}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-n8n} -d ${POSTGRES_DB:-n8n}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [scout]

  valkey:
    image: valkey/valkey:8-alpine
    restart: unless-stopped
    command: ["valkey-server", "--save", "30 1", "--appendonly", "no"]
    volumes:
      - valkey_data:/data
    networks: [scout]

  searxng:
    image: searxng/searxng:latest
    restart: unless-stopped
    depends_on: [valkey]
    environment:
      SEARXNG_BASE_URL: ${SEARXNG_BASE_URL:-http://localhost:8080/}
      TZ: ${TZ:-Africa/Nairobi}
    volumes:
      - ./searxng:/etc/searxng:rw
    # Published only on localhost for debugging; n8n reaches it privately at http://searxng:8080
    ports:
      - "127.0.0.1:8080:8080"
    networks: [scout]

  n8n:
    image: n8nio/n8n:latest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      searxng:
        condition: service_started
    environment:
      # ---- addressing ----
      N8N_HOST: ${N8N_HOST:-localhost}
      N8N_PORT: "5678"
      N8N_PROTOCOL: ${N8N_PROTOCOL:-http}
      N8N_EDITOR_BASE_URL: ${N8N_PUBLIC_URL:-http://localhost:5678/}
      WEBHOOK_URL: ${N8N_PUBLIC_URL:-http://localhost:5678/}
      GENERIC_TIMEZONE: ${TZ:-Africa/Nairobi}
      TZ: ${TZ:-Africa/Nairobi}
      # ---- security ----
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY:?set N8N_ENCRYPTION_KEY in .env}
      N8N_SECURE_COOKIE: ${N8N_SECURE_COOKIE:-false}
      N8N_PROXY_HOPS: ${N8N_PROXY_HOPS:-0}
      # ---- database ----
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: "5432"
      DB_POSTGRESDB_DATABASE: ${POSTGRES_DB:-n8n}
      DB_POSTGRESDB_USER: ${POSTGRES_USER:-n8n}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      # ---- workflow needs these ----
      # the Code nodes read $env.SEARXNG_URL; allow env access in nodes:
      SEARXNG_URL: http://searxng:8080
      N8N_BLOCK_ENV_ACCESS_IN_NODE: "false"
      # ---- misc ----
      N8N_RUNNERS_ENABLED: "true"
      N8N_DIAGNOSTICS_ENABLED: "false"
    volumes:
      - n8n_data:/home/node/.n8n
      - ./workflows:/workflows:ro
    # Published only on localhost; in production Caddy fronts it over HTTPS.
    ports:
      - "127.0.0.1:5678:5678"
    networks: [scout]

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    profiles: ["proxy"]
    depends_on: [n8n]
    environment:
      N8N_DOMAIN: ${N8N_DOMAIN:?set N8N_DOMAIN in .env to use the proxy profile}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks: [scout]

  mailpit:
    image: axllent/mailpit:latest
    restart: unless-stopped
    profiles: ["dev"]
    ports:
      - "127.0.0.1:8025:8025"   # web inbox
      - "127.0.0.1:1025:1025"   # SMTP endpoint for the n8n email credential
    networks: [scout]

volumes:
  postgres_data:
  n8n_data:
  valkey_data:
  caddy_data:
  caddy_config:

networks:
  scout:
    driver: bridge
